<svg width="1120" height="620" viewBox="0 0 1120 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Saga orchestration service flow</title>
  <desc id="desc">A saga orchestration flow showing the orchestration service calling Database A and Database B, receiving a failure from Database B, and then sending a compensation command to Database A.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E3A6E"/>
      <stop offset="0.52" stop-color="#1A4F8A"/>
      <stop offset="1" stop-color="#2E6DB4"/>
    </linearGradient>
    <linearGradient id="dbFill" x1="0" y1="0" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D6EAF7"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0E2A4A" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#D6EAF7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#1D7A6A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowWarn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#D97A35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1120" height="620" rx="28" fill="#F0F7FD"/>
  <rect x="28" y="28" width="1064" height="564" rx="24" fill="url(#bg)"/>
  <circle cx="152" cy="512" r="178" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="964" cy="110" r="150" fill="#1D7A6A" opacity="0.15"/>

  <text x="76" y="86" fill="#FFFFFF" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="32" font-weight="800">Saga Orchestration</text>
  <text x="78" y="118" fill="#D6EAF7" font-family="Inter, Arial, sans-serif" font-size="16">Forward transactions are local. Failed steps return to the orchestration service, which decides compensation.</text>

  <g filter="url(#shadow)">
    <rect x="390" y="186" width="340" height="142" rx="20" fill="#FFFFFF"/>
    <rect x="420" y="212" width="162" height="34" rx="17" fill="#D4EEE9"/>
    <text x="440" y="234" fill="#1D7A6A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">workflow owner</text>
    <text x="430" y="282" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="26" font-weight="800">Orchestration Service</text>
    <text x="430" y="306" fill="#4A6080" font-family="Inter, Arial, sans-serif" font-size="14">tracks steps, retries, compensation</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="206" cy="198" rx="120" ry="34" fill="#FFFFFF"/>
    <path d="M86 198V318C86 336.778 139.726 352 206 352C272.274 352 326 336.778 326 318V198" fill="url(#dbFill)"/>
    <path d="M86 198V318C86 336.778 139.726 352 206 352C272.274 352 326 336.778 326 318V198" stroke="#4A8FD4" stroke-width="4"/>
    <ellipse cx="206" cy="198" rx="120" ry="34" stroke="#4A8FD4" stroke-width="4"/>
    <path d="M86 258C86 276.778 139.726 292 206 292C272.274 292 326 276.778 326 258" stroke="#BDD8F2" stroke-width="2"/>
    <text x="146" y="258" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="23" font-weight="800">Database A</text>
    <text x="164" y="288" fill="#4A6080" font-family="Inter, Arial, sans-serif" font-size="15">User A</text>
    <text x="133" y="324" fill="#1D7A6A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">deduct Rs. 10,000</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="914" cy="198" rx="120" ry="34" fill="#FFFFFF"/>
    <path d="M794 198V318C794 336.778 847.726 352 914 352C980.274 352 1034 336.778 1034 318V198" fill="url(#dbFill)"/>
    <path d="M794 198V318C794 336.778 847.726 352 914 352C980.274 352 1034 336.778 1034 318V198" stroke="#1D7A6A" stroke-width="4"/>
    <ellipse cx="914" cy="198" rx="120" ry="34" stroke="#1D7A6A" stroke-width="4"/>
    <path d="M794 258C794 276.778 847.726 292 914 292C980.274 292 1034 276.778 1034 258" stroke="#A8D8CF" stroke-width="2"/>
    <text x="854" y="258" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="23" font-weight="800">Database B</text>
    <text x="872" y="288" fill="#4A6080" font-family="Inter, Arial, sans-serif" font-size="15">User B</text>
    <text x="846" y="324" fill="#1D7A6A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">credit Rs. 10,000</text>
  </g>

  <path d="M390 236H326" stroke="#D6EAF7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="336" y="215" fill="#D6EAF7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Step 1</text>
  <path d="M730 236H794" stroke="#D6EAF7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="740" y="215" fill="#D6EAF7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Step 2</text>

  <path d="M914 352C914 414 808 438 670 342" stroke="#D97A35" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowWarn)"/>
  <text x="790" y="418" fill="#FFD8C4" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">failure returns to orchestration service</text>

  <g filter="url(#shadow)">
    <rect x="342" y="424" width="436" height="72" rx="18" fill="#FFFFFF"/>
    <text x="386" y="454" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="21" font-weight="800">Compensation command</text>
    <text x="386" y="480" fill="#4A6080" font-family="Inter, Arial, sans-serif" font-size="15">credit Rs. 10,000 back to User A</text>
  </g>

  <path d="M454 424C326 408 206 386 206 352" stroke="#1D7A6A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <path d="M560 328V424" stroke="#1D7A6A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <text x="576" y="384" fill="#D4EEE9" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">orchestrator decides revert</text>

  <rect x="200" y="540" width="720" height="34" rx="17" fill="rgba(255,255,255,0.16)" stroke="#D6EAF7" stroke-width="1.5"/>
  <text x="560" y="562" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Success: Step 1 -> Step 2 | Failure: Step 2 -> Orchestrator -> Compensation</text>
</svg>
