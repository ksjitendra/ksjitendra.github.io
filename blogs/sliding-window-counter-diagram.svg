<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sliding Window Counter example</title>
  <desc id="desc">A simple visual showing 45 seconds from the previous minute, 15 seconds from the current minute, previous count 80, current count 20, and an estimated count of 80.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E3A6E"/>
      <stop offset="0.55" stop-color="#1A4F8A"/>
      <stop offset="1" stop-color="#2E6DB4"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-14%" width="116%" height="128%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0E2A4A" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#D6EAF7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1120" height="520" rx="28" fill="#F0F7FD"/>
  <rect x="28" y="28" width="1064" height="464" rx="24" fill="url(#bg)"/>
  <circle cx="960" cy="96" r="142" fill="#1D7A6A" opacity="0.15"/>
  <circle cx="150" cy="440" r="162" fill="#FFFFFF" opacity="0.05"/>

  <text x="78" y="88" fill="#FFFFFF" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="32" font-weight="800">Sliding Window Counter</text>
  <text x="80" y="118" fill="#D6EAF7" font-family="Inter, Arial, sans-serif" font-size="16">Example at 12:01:15</text>

  <g filter="url(#shadow)">
    <rect x="92" y="176" width="468" height="176" rx="18" fill="#FFFFFF"/>
    <rect x="92" y="176" width="351" height="176" rx="18" fill="#D6EAF7"/>
    <path d="M443 176H542C551.941 176 560 184.059 560 194V334C560 343.941 551.941 352 542 352H443V176Z" fill="#FFFFFF"/>
    <rect x="92" y="176" width="468" height="176" rx="18" stroke="#4A8FD4" stroke-width="4"/>
    <text x="126" y="218" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="24" font-weight="800">previous minute</text>
    <text x="268" y="306" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="78" font-weight="800">80</text>
    <text x="132" y="332" fill="#1D7A6A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">45s overlap</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="176" width="468" height="176" rx="18" fill="#FFFFFF"/>
    <rect x="560" y="176" width="117" height="176" rx="18" fill="#D4EEE9"/>
    <path d="M677 176H1010C1019.94 176 1028 184.059 1028 194V334C1028 343.941 1019.94 352 1010 352H677V176Z" fill="#FFFFFF"/>
    <rect x="560" y="176" width="468" height="176" rx="18" stroke="#1D7A6A" stroke-width="4"/>
    <text x="598" y="218" fill="#1D7A6A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="24" font-weight="800">current minute</text>
    <text x="744" y="306" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="78" font-weight="800">20</text>
    <text x="598" y="332" fill="#1D7A6A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">15s elapsed</text>
  </g>

  <path d="M209 152H677" stroke="#D6EAF7" stroke-width="4" stroke-linecap="round"/>
  <path d="M209 152V168" stroke="#D6EAF7" stroke-width="4" stroke-linecap="round"/>
  <path d="M677 152V168" stroke="#D6EAF7" stroke-width="4" stroke-linecap="round"/>
  <text x="340" y="143" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">rolling 60s window</text>

  <path d="M677 372V352" stroke="#D6EAF7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="626" y="404" fill="#D6EAF7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">now</text>

  <g filter="url(#shadow)">
    <rect x="250" y="420" width="620" height="50" rx="25" fill="#FFFFFF"/>
    <text x="306" y="452" fill="#1A4F8A" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="20" font-weight="800">80 x 75% + 20 = 80</text>
    <text x="575" y="452" fill="#1D7A6A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">request allowed</text>
  </g>
</svg>
